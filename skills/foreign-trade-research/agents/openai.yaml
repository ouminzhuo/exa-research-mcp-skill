interface:
  display_name: "Foreign Trade Research"
  short_description: "Deep overseas market and competitor reports"
  default_prompt: "Use $foreign-trade-research to produce a cited overseas market entry and competitor research report."
dependencies:
  tools:
    - type: "mcp"
      value: "exa"
      description: "Exa MCP server for advanced web/company/news/people search when available"
      transport: "streamable_http"
      url: "https://mcp.exa.ai/mcp"
    - type: "mcp"
      value: "chrome-mcp"
      description: "User-configured sanitized Chrome MCP for human-browser verification and dynamic pages"
policy:
  allow_implicit_invocation: true
